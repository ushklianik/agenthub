<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="600" viewBox="0 0 1440 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f1a"/>
      <stop offset="50%" style="stop-color:#1a0a2e"/>
      <stop offset="100%" style="stop-color:#0a1628"/>
    </linearGradient>
    <linearGradient id="glow1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0.1"/>
    </linearGradient>
    <radialGradient id="center-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#0f0f1a;stop-opacity:0"/>
    </radialGradient>
    <filter id="blur-glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1440" height="600" fill="url(#bg)"/>
  <rect width="1440" height="600" fill="url(#center-glow)"/>

  <!-- Grid lines -->
  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="100" x2="1440" y2="100"/>
    <line x1="0" y1="200" x2="1440" y2="200"/>
    <line x1="0" y1="300" x2="1440" y2="300"/>
    <line x1="0" y1="400" x2="1440" y2="400"/>
    <line x1="0" y1="500" x2="1440" y2="500"/>
    <line x1="200" y1="0" x2="200" y2="600"/>
    <line x1="400" y1="0" x2="400" y2="600"/>
    <line x1="600" y1="0" x2="600" y2="600"/>
    <line x1="800" y1="0" x2="800" y2="600"/>
    <line x1="1000" y1="0" x2="1000" y2="600"/>
    <line x1="1200" y1="0" x2="1200" y2="600"/>
  </g>

  <!-- Agent avatar circles -->
  <circle cx="200" cy="180" r="48" fill="#7c3aed" opacity="0.8" filter="url(#blur-glow)"/>
  <text x="200" y="188" text-anchor="middle" fill="white" font-size="18" font-weight="bold" font-family="Arial">AI</text>

  <circle cx="380" cy="320" r="36" fill="#06b6d4" opacity="0.7" filter="url(#blur-glow)"/>
  <text x="380" y="328" text-anchor="middle" fill="white" font-size="14" font-weight="bold" font-family="Arial">ML</text>

  <circle cx="1100" cy="200" r="52" fill="#ec4899" opacity="0.7" filter="url(#blur-glow)"/>
  <text x="1100" y="208" text-anchor="middle" fill="white" font-size="18" font-weight="bold" font-family="Arial">NLP</text>

  <circle cx="1260" cy="380" r="40" fill="#10b981" opacity="0.7" filter="url(#blur-glow)"/>
  <text x="1260" y="388" text-anchor="middle" fill="white" font-size="14" font-weight="bold" font-family="Arial">CV</text>

  <circle cx="900" cy="130" r="32" fill="#f59e0b" opacity="0.6" filter="url(#blur-glow)"/>
  <text x="900" y="138" text-anchor="middle" fill="white" font-size="12" font-weight="bold" font-family="Arial">RL</text>

  <!-- Connection lines -->
  <line x1="200" y1="180" x2="720" y2="300" stroke="#7c3aed" stroke-opacity="0.3" stroke-width="1.5"/>
  <line x1="380" y1="320" x2="720" y2="300" stroke="#06b6d4" stroke-opacity="0.3" stroke-width="1.5"/>
  <line x1="1100" y1="200" x2="720" y2="300" stroke="#ec4899" stroke-opacity="0.3" stroke-width="1.5"/>
  <line x1="1260" y1="380" x2="720" y2="300" stroke="#10b981" stroke-opacity="0.3" stroke-width="1.5"/>
  <line x1="900" y1="130" x2="720" y2="300" stroke="#f59e0b" stroke-opacity="0.3" stroke-width="1.5"/>

  <!-- Central hub -->
  <circle cx="720" cy="300" r="64" fill="url(#glow1)" stroke="#7c3aed" stroke-width="2" stroke-opacity="0.6"/>
  <circle cx="720" cy="300" r="44" fill="#1a0a2e" stroke="#06b6d4" stroke-width="1" stroke-opacity="0.4"/>
  <text x="720" y="296" text-anchor="middle" fill="white" font-size="13" font-weight="bold" font-family="Arial">AGENT</text>
  <text x="720" y="314" text-anchor="middle" fill="#a78bfa" font-size="11" font-family="Arial">HUB</text>

  <!-- Main headline -->
  <text x="720" y="460" text-anchor="middle" fill="white" font-size="42" font-weight="bold" font-family="Arial" opacity="0.95">Find Your Perfect AI Agent</text>
  <text x="720" y="500" text-anchor="middle" fill="#94a3b8" font-size="18" font-family="Arial">The marketplace for intelligent automation</text>

  <!-- Decorative dots -->
  <circle cx="450" cy="80" r="3" fill="#7c3aed" opacity="0.5"/>
  <circle cx="520" cy="50" r="2" fill="#06b6d4" opacity="0.4"/>
  <circle cx="980" cy="520" r="3" fill="#ec4899" opacity="0.5"/>
  <circle cx="1050" cy="490" r="2" fill="#10b981" opacity="0.4"/>
  <circle cx="150" cy="420" r="3" fill="#f59e0b" opacity="0.4"/>
  <circle cx="1350" cy="120" r="4" fill="#7c3aed" opacity="0.5"/>
</svg>
